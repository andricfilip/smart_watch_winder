<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-labelledby="title desc">
  <title id="title">Filip Andric Signature</title>
  <desc id="desc">Stylized watch icon with signature text Filip Andric.</desc>
  <defs>
    <linearGradient id="fa-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4DE2B8" />
      <stop offset="100%" stop-color="#F7C86A" />
    </linearGradient>
  </defs>

  <g transform="translate(8 10)">
    <rect x="0" y="0" width="92" height="92" rx="22" fill="#0D2234" stroke="#3A6C8E" stroke-width="3" />
    <circle cx="46" cy="46" r="25" fill="#F6FAFF" />
    <circle cx="46" cy="46" r="3" fill="#1E5AA8" />
    <path d="M46 46l10-9" stroke="#1E5AA8" stroke-width="4" stroke-linecap="round" />
    <path d="M46 46V30" stroke="#E89B2D" stroke-width="4" stroke-linecap="round" />
    <rect x="36" y="-8" width="20" height="14" rx="6" fill="url(#fa-accent)" />
    <rect x="36" y="86" width="20" height="14" rx="6" fill="url(#fa-accent)" />
  </g>

  <g transform="translate(122 18)">
    <text x="0" y="42" fill="#E7F7FF" font-family="Syne, Segoe UI, sans-serif" font-size="34" font-weight="700" letter-spacing="0.5">Filip Andrić</text>
    <text x="0" y="74" fill="#9AB8C5" font-family="Syne, Segoe UI, sans-serif" font-size="18">Watch Winder Dashboard</text>
  </g>
</svg>
