services:
  watch-winder-dashboard-modern:
    image: watch-winder-dashboard-modern:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: watch-winder-dashboard-modern
    restart: unless-stopped
    environment:
      APP_DEVICE_MODE: single
      APP_LOCK_DEVICE_MODE: "true"
      APP_DEFAULT_DEVICE_URL: http://192.168.1.111
      APP_LOCK_DEVICE_URL: "true"
      APP_LANGUAGE: sr
      APP_LOCK_LANGUAGE: "false"
    ports:
      - "8090:80"
